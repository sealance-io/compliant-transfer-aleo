name: SDK Release - Version

on:
  push:
    branches:
      - main
    paths:
      - "packages/policy-engine-sdk/**"
      - ".changeset/**"
      # README.md is NOT excluded - it ships to npm and is user-facing
      - "!packages/policy-engine-sdk/CHANGELOG.md" # Auto-generated by changesets
      - "!packages/policy-engine-sdk/DEVELOPMENT.md" # Internal docs, doesn't ship
      - "!packages/policy-engine-sdk/QUICK_START.md" # Internal docs, doesn't ship
      - "!packages/policy-engine-sdk/examples/**"
      - "!packages/policy-engine-sdk/test/**"

# No default permissions - jobs must explicitly request what they need
permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false # Never cancel versioning

jobs:
  version:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: release-automation
    permissions:
      contents: read # Checkout clone only; app token handles all writes
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ vars.SEALANCE_PUBLIC_SIGNER_APP_ID }}
          private-key: ${{ secrets.SEALANCE_PUBLIC_SIGNER_APP_PRIVATE_KEY }}
          repositories: compliant-transfer-aleo
          permission-contents: write
          permission-pull-requests: write

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: ".nvmrc"

      - name: Install dependencies
        run: npm ci --ignore-scripts --allow-git=none --no-audit --no-fund

      - name: Create Release Pull Request
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1.7.0
        with:
          title: "chore(release): version packages"
          commit: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
