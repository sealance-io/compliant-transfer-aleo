name: SDK Release - Publish

on:
  push:
    branches:
      - main
    paths:
      - "packages/policy-engine-sdk/package.json"
      - "packages/policy-engine-sdk/CHANGELOG.md"
  workflow_dispatch:

# No default permissions - jobs must explicitly request what they need
permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false # Never cancel publishing

jobs:
  # Gate: Only proceed if this push came from a merged release PR
  check-release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    outputs:
      should_publish: ${{ steps.check.outputs.should_publish }}
      version: ${{ steps.version.outputs.version }}
    defaults:
      run:
        shell: bash -eo pipefail {0}
    steps:
      - name: Check if push came from release PR
        id: check
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            if (context.eventName === 'workflow_dispatch') {
              if (context.ref !== 'refs/heads/main') {
                core.setOutput('should_publish', 'false');
                console.log(`Manual publish requested from ${context.ref} - only main is allowed`);
                return;
              }

              core.setOutput('should_publish', 'true');
              console.log(`Manual publish requested from ${context.ref} - proceeding to publish`);
              return;
            }

            const { owner, repo } = context.repo;
            const commitSha = context.sha;

            const { data: pullRequests } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner,
              repo,
              commit_sha: commitSha
            });

            const releasePr = pullRequests.find((pr) =>
              pr.merged_at &&
              pr.base.ref === 'main' &&
              pr.head.ref === 'changeset-release/main'
            );

            if (releasePr) {
              core.setOutput('should_publish', 'true');
              console.log(`Release PR #${releasePr.number} detected for ${commitSha} - proceeding to publish`);
            } else {
              core.setOutput('should_publish', 'false');
              console.log(`No merged release PR associated with ${commitSha} - skipping publish`);
            }

      - name: Checkout
        if: steps.check.outputs.should_publish == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Get package version
        if: steps.check.outputs.should_publish == 'true'
        id: version
        run: |
          VERSION=$(jq -r '.version' packages/policy-engine-sdk/package.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Package version: $VERSION"

  # Audit runtime dependencies before publish approval
  # Runs before the environment gate so maintainers see the result first
  audit-runtime:
    needs: check-release
    if: needs.check-release.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    defaults:
      run:
        shell: bash -eo pipefail {0}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          # cache: "npm"  # Disabled — consistent with publish-npm security stance
          node-version-file: ".nvmrc"

      - name: Install dependencies
        run: npm ci --ignore-scripts --allow-git=none --no-audit --no-fund

      - name: Audit runtime dependencies
        run: npm audit --workspace=@sealance-io/policy-engine-aleo --omit=dev --omit=peer --audit-level=high

  # Publish to npm registry using OIDC (no token required)
  publish-npm:
    needs: [check-release, audit-runtime]
    if: needs.check-release.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: npm-publish # Protected environment with required reviewers
    permissions:
      contents: read
      id-token: write # REQUIRED for npm OIDC trusted publishing
    defaults:
      run:
        shell: bash -eo pipefail {0}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          # cache: "npm"  # Disabled to prevent cache poisoning in release workflow
          node-version-file: ".nvmrc"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci --ignore-scripts --allow-git=none --no-audit --no-fund

      - name: Build SDK
        run: npm run build --workspace=@sealance-io/policy-engine-aleo

      - name: Check if already published
        id: check-published
        run: |
          if npm view "@sealance-io/policy-engine-aleo@${VERSION}" version 2>/dev/null; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "Version $VERSION already exists on npm - skipping publish"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          VERSION: ${{ needs.check-release.outputs.version }}

      - name: Determine dist-tag
        if: steps.check-published.outputs.already_published != 'true'
        id: dist-tag
        env:
          VERSION: ${{ needs.check-release.outputs.version }}
        run: |
          if [[ "$VERSION" == *"-alpha"* ]]; then
            echo "tag=alpha" >> "$GITHUB_OUTPUT"
            echo "Detected alpha pre-release: using 'alpha' dist-tag"
          elif [[ "$VERSION" == *"-beta"* ]]; then
            echo "tag=beta" >> "$GITHUB_OUTPUT"
            echo "Detected beta pre-release: using 'beta' dist-tag"
          elif [[ "$VERSION" == *"-rc"* ]]; then
            echo "tag=rc" >> "$GITHUB_OUTPUT"
            echo "Detected release candidate: using 'rc' dist-tag"
          elif [[ "$VERSION" == *"-"* ]]; then
            echo "tag=next" >> "$GITHUB_OUTPUT"
            echo "Detected pre-release: using 'next' dist-tag"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
            echo "Stable release: using 'latest' dist-tag"
          fi

      - name: Publish to npm (with retry)
        if: steps.check-published.outputs.already_published != 'true'
        run: |
          publish_args=(--workspace=@sealance-io/policy-engine-aleo --provenance)
          if [[ "$DIST_TAG" != "latest" ]]; then
            publish_args+=(--tag "$DIST_TAG")
            echo "Publishing with dist-tag: $DIST_TAG"
          fi

          for attempt in 1 2 3; do
            echo "Publish attempt $attempt of 3..."
            if npm publish "${publish_args[@]}"; then
              echo "Successfully published to npm"
              exit 0
            fi
            if [[ $attempt -lt 3 ]]; then
              echo "Attempt $attempt failed, waiting 30s before retry..."
              sleep 30
            fi
          done
          echo "All publish attempts failed"
          exit 1
        env:
          DIST_TAG: ${{ steps.dist-tag.outputs.tag }}
        # NO NODE_AUTH_TOKEN - OIDC handles authentication automatically
        # --provenance generates Sigstore attestation (explicit for reliability)

  # Create GitHub Release
  create-release:
    needs: [check-release, publish-npm]
    if: needs.check-release.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # Required for creating releases
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Create GitHub Release
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          PACKAGE_VERSION: ${{ needs.check-release.outputs.version }}
        with:
          script: |
            const version = process.env.PACKAGE_VERSION;
            const tag = `@sealance-io/policy-engine-aleo@${version}`;
            const releaseSha = context.sha;

            // Create tag (idempotent - handle re-runs gracefully)
            try {
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `refs/tags/${tag}`,
                sha: releaseSha
              });
              console.log(`Created tag ${tag}`);
            } catch (e) {
              if (e.status === 422 && e.message.includes('Reference already exists')) {
                console.log(`Tag ${tag} already exists (workflow re-run) - continuing`);
              } else {
                throw e;
              }
            }

            // Create release (idempotent - handle re-runs gracefully)
            try {
              await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: `@sealance-io/policy-engine-aleo v${version}`,
                body: `See [CHANGELOG.md](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/packages/policy-engine-sdk/CHANGELOG.md) for details.\n\n**npm:** https://www.npmjs.com/package/@sealance-io/policy-engine-aleo/v/${version}`,
                draft: false,
                prerelease: version.includes('-')
              });
              console.log(`Created release for ${tag}`);
            } catch (e) {
              if (e.status === 422) {
                console.log(`Release for ${tag} already exists (workflow re-run) - continuing`);
              } else {
                throw e;
              }
            }

  # Rollup status for tracking
  release-status:
    name: Release Status
    needs: [check-release, audit-runtime, publish-npm, create-release]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {} # No permissions needed - just checks job results
    defaults:
      run:
        shell: bash -eo pipefail {0}
    steps:
      - name: Check results
        run: |
          echo "::group::Job Results"
          echo "Should publish: $SHOULD_PUBLISH"
          echo "Runtime audit: $AUDIT_RESULT"
          echo "npm publish: $NPM_RESULT"
          echo "Release: $RELEASE_RESULT"
          echo "::endgroup::"

          if [[ "$SHOULD_PUBLISH" != "true" ]]; then
            echo "::notice::Not a release PR - skipped publishing"
            exit 0
          fi

          # Runtime audit must pass
          if [[ "$AUDIT_RESULT" != "success" ]]; then
            echo "::error::Runtime dependency audit failed - check for vulnerabilities in SDK dependencies"
            exit 1
          fi

          # npm publish is REQUIRED
          if [[ "$NPM_RESULT" != "success" ]]; then
            echo "::error::npm publish failed - release blocked"
            exit 1
          fi

          # GitHub Release creation is REQUIRED
          if [[ "$RELEASE_RESULT" != "success" ]]; then
            echo "::error::GitHub Release creation failed"
            exit 1
          fi

          echo "::notice::Release completed successfully (npm + GitHub Release)"
        env:
          SHOULD_PUBLISH: ${{ needs.check-release.outputs.should_publish }}
          AUDIT_RESULT: ${{ needs.audit-runtime.result }}
          NPM_RESULT: ${{ needs.publish-npm.result }}
          RELEASE_RESULT: ${{ needs.create-release.result }}
